<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商業火災保險報價單系統 第一版</title>
  <style>
    :root {
      --ink: #172438;
      --muted: #5c6b7a;
      --line: #cbd7e2;
      --line-strong: #8ea4b7;
      --head: #15324d;
      --head-2: #2f5f7c;
      --paper: #ffffff;
      --soft: #eef5f9;
      --field: #fff8e3;
      --ok: #2e7d32;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      color: var(--ink);
      background: #f4f7fa;
      line-height: 1.45;
    }
    button, input, select, textarea { font: inherit; }
    .topbar {
      background: var(--head);
      color: #fff;
      padding: 16px 22px 14px;
      border-bottom: 4px solid #5e9fc0;
    }
    .topbar h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
    }
    .topbar p {
      margin: 5px 0 0;
      color: #dbeaf2;
      font-size: 14px;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(420px, 520px) minmax(680px, 1fr);
      gap: 18px;
      padding: 18px;
      align-items: start;
    }
    .panel, .preview-shell {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      background: var(--head-2);
      color: #fff;
      font-weight: 700;
    }
    .panel-body { padding: 14px; }
    .section-title {
      margin: 18px 0 8px;
      padding: 7px 10px;
      background: var(--soft);
      border-left: 4px solid var(--head-2);
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    label.field {
      display: grid;
      gap: 4px;
      font-size: 13px;
      color: var(--muted);
    }
    input, select, textarea {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 8px 9px;
      background: var(--field);
      color: var(--ink);
    }
    textarea { min-height: 70px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid #69a9c9;
      outline-offset: 1px;
    }
    .wide { grid-column: 1 / -1; }
    .mini-note { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }
    .btn {
      border: 1px solid #9bb0c2;
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn.primary {
      background: var(--head);
      color: #fff;
      border-color: var(--head);
    }
    .btn.good {
      background: var(--ok);
      color: #fff;
      border-color: var(--ok);
    }
    .btn.danger {
      color: var(--danger);
      border-color: #d49b94;
    }
    .btn:hover { filter: brightness(0.97); }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 7px 8px;
      vertical-align: top;
      word-break: break-word;
    }
    th {
      background: var(--head-2);
      color: #fff;
      font-weight: 700;
      text-align: center;
    }
    .input-table td { padding: 5px; }
    .input-table input, .input-table select, .input-table textarea {
      border-radius: 4px;
      padding: 6px;
    }
    .location-block {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
      background: #fbfdff;
    }
    .location-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #e6f0f6;
      font-weight: 700;
    }
    .location-body { padding: 10px; }
    .money-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .clause-box {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }
    .clause-row {
      display: grid;
      grid-template-columns: 34px 74px 1fr;
      gap: 8px;
      align-items: start;
      padding: 7px 8px;
      border-bottom: 1px solid #e7edf3;
      font-size: 13px;
    }
    .clause-row:last-child { border-bottom: 0; }
    .clause-row input { width: 18px; height: 18px; margin: 1px auto 0; }
    .quote {
      background: #fff;
      min-height: 960px;
      padding: 24px;
    }
    .quote-title {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      border-bottom: 3px solid var(--head);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }
    .quote-title h2 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }
    .quote-title .meta { text-align: right; color: var(--muted); font-size: 13px; }
    .quote h3 {
      margin: 10px 0 4px;
      font-size: 14px;
      padding: 3px 6px;
      background: #fff200;
      color: #111;
    }
    .quote table { font-size: 12px; }
    .quote th { background: #fff200; color: #111; border-color: #d8d15f; }
    .quote th, .quote td { padding: 4px 6px; }
    .quote td { border-color: #d7dee6; }
    .info-grid {
      display: grid;
      grid-template-columns: 120px 1fr 120px 1fr;
      border: 1px solid var(--line);
      border-bottom: 0;
      font-size: 13px;
    }
    .info-grid > div {
      border-bottom: 1px solid var(--line);
      padding: 7px 8px;
      min-height: 32px;
    }
    .info-label { background: #eef5f9; font-weight: 700; }
    .terms-list {
      columns: 2;
      column-gap: 26px;
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
    }
    .terms-list li { break-inside: avoid; margin: 0 0 4px; }
    .empty {
      color: var(--muted);
      padding: 28px;
      text-align: center;
      border: 1px dashed var(--line-strong);
      background: #fbfdff;
      border-radius: 8px;
    }
    @media (max-width: 1180px) {
      .app { grid-template-columns: 1fr; }
    }
    @media print {
      body { background: #fff; }
      .topbar, .panel, .print-actions { display: none !important; }
      .app { display: block; padding: 0; }
      .preview-shell { border: 0; border-radius: 0; }
      .quote { padding: 12mm; min-height: auto; }
      @page { size: A4 landscape; margin: 8mm; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>商業火災保險報價單系統</h1>
    <p>輸入公司與標的物資料，系統會依保額標的自動建議 SB 附加條款，並產生可列印成 PDF 的報價單。</p>
  </header>

  <main class="app">
    <section class="panel">
      <div class="panel-header">
        <span>INPUT：報價資料</span>
        <span id="saveStatus">尚未產生</span>
      </div>
      <div class="panel-body">
        <div class="toolbar">
          <button class="btn" id="sampleBtn" type="button">帶入範例</button>
          <button class="btn" id="clearBtn" type="button">清空</button>
          <button class="btn primary" id="generateBtn" type="button">產生報價單</button>
          <button class="btn good" id="printBtn" type="button">列印 / 存成 PDF</button>
        </div>

        <div class="section-title">被保險人資訊</div>
        <div class="grid">
          <label class="field">產業別
            <select id="industry">
              <option>汽車業</option>
              <option>一般商業</option>
              <option>製造業</option>
              <option>倉儲物流</option>
              <option>其他</option>
            </select>
          </label>
          <label class="field">公司名稱
            <input id="companyName">
          </label>
          <label class="field">統一編號
            <input id="taxId">
          </label>
          <label class="field">代表人
            <input id="representative">
          </label>
          <label class="field">電話
            <input id="phone">
          </label>
          <label class="field wide">通訊地址
            <input id="mailingAddress">
          </label>
          <label class="field wide">保險期間
            <input id="insurancePeriod" placeholder="例：2026/07/01 中午12時起至 2027/07/01 中午12時止">
          </label>
        </div>

        <div class="section-title">標的物地址與保額</div>
        <div id="locations"></div>
        <button class="btn" id="addLocationBtn" type="button">新增標的物地址</button>
        <p class="mini-note">金額可輸入 35000000 或 35,000,000；系統會自動加總火險保額並判斷適用的附加條款標的。</p>

        <div class="section-title">自負額、天災與備註</div>
        <div class="grid">
          <label class="field wide">自負額
            <textarea id="deductible">火險及其他附加險：每一事故為賠償金額之10%，最低NT$3萬元。</textarea>
          </label>
          <label class="field">天災險保額比例
            <select id="natPercent"></select>
          </label>
          <label class="field">天災保險限額
            <select id="natLimit"></select>
          </label>
          <label class="field">其他附加險比例
            <select id="addonPercent"></select>
          </label>
          <label class="field wide">備註
            <textarea id="remarks"></textarea>
          </label>
        </div>

        <div class="section-title">附加險種與保額</div>
        <table class="input-table">
          <thead>
            <tr><th style="width:46px">納入</th><th>附加險種</th><th style="width:170px">個別比例（選填）</th></tr>
          </thead>
          <tbody id="covers"></tbody>
        </table>
        <button class="btn" id="addCoverBtn" type="button" style="margin-top:8px">新增附加險種</button>
        <p class="mini-note">個別比例不用每列選；留「依上方設定」即可。只有某個附加險比例不同時，再於該列改成指定比例。</p>

        <div class="section-title">SB 附加條款</div>
        <div class="toolbar">
          <button class="btn" id="recommendBtn" type="button">依保額自動建議</button>
          <button class="btn" id="selectAllClausesBtn" type="button">全選</button>
          <button class="btn" id="clearClausesBtn" type="button">清空條款</button>
          <button class="btn" id="addCustomClauseBtn" type="button">新增自訂條款</button>
        </div>
        <div class="clause-box" id="clauseBox"></div>
        <div id="customClauseBox" style="margin-top:8px"></div>
      </div>
    </section>

    <section class="preview-shell">
      <div class="panel-header print-actions">
        <span>OUTPUT：報價單預覽</span>
        <span>可列印成 PDF</span>
      </div>
      <div class="quote" id="quotePreview">
        <div class="empty">填完左側資料後，按「產生報價單」。</div>
      </div>
    </section>
  </main>

  <script>

    function byId(id) { return document.getElementById(id); }
    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
    }
    function moneyValue(value) {
      const n = Number(String(value ?? "").replace(/[^0-9.-]/g, ""));
      return Number.isFinite(n) ? n : 0;
    }
    function fmtMoney(value) {
      const n = moneyValue(value);
      return n ? n.toLocaleString("zh-TW") : "";
    }
    function fieldAmountText(value) {
      const amount = fmtMoney(value);
      if (!amount) return "";
      const suffix = [...plain(value).matchAll(/[（(]([^（）()]*)[）)]/g)]
        .map(match => match[1])
        .filter(text => text.includes("含"))
        .map(text => `(${escapeHtml(text)})`)
        .join("");
      return amount + suffix;
    }
    function fmtAmountText(value) {
      const text = plain(value);
      if (!text) return "";
      if (/^[0-9,]+$/.test(text)) return fmtMoney(text);
      return text.replace(/[0-9][0-9,]*/g, match => {
        const cleaned = match.replace(/,/g, "");
        return cleaned.length >= 4 ? Number(cleaned).toLocaleString("zh-TW") : match;
      });
    }
    function cleanClauseTitle(value) {

                <select data-field="repairShop">
                  <option ${data.repairShop !== "是" ? "selected" : ""}>否</option>
                  <option ${data.repairShop === "是" ? "selected" : ""}>是</option>
                </select>
              </label>
              <label class="field wide">標的物地址
                <input data-field="address" value="${escapeHtml(data.address || "")}">
              </label>
              <label class="field">使用性質
                <input data-field="usageNature" value="${escapeHtml(data.usageNature || "")}" placeholder="例：辦公室、堆棧、倉庫">
              </label>
              <label class="field wide">建築結構</label>
              <textarea class="wide" data-field="structure" placeholder="手寫內容可打在這裡">${escapeHtml(data.structure || "")}</textarea>
            </div>
            <div class="money-grid" style="margin-top:10px">
              ${moneyFields.map(field => {
                const label = fieldMeta[field].label;
                return `<label class="field">${label}<input data-field="${field}" value="${escapeHtml(data[field] || "")}" placeholder="保額"></label>`;
              }).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function addLocation(data = {}) {
      const box = byId("locations");
      box.insertAdjacentHTML("beforeend", locationTemplate(box.querySelectorAll("[data-location]").length, data));
      updateLocationNumbers();
      syncIndustryFields();
    }

    function updateLocationNumbers() {
      byId("locations").querySelectorAll("[data-location]").forEach((block, idx) => {
        block.querySelector(".location-head span").textContent = `標的物 ${idx + 1}`;
      });
    }

    function syncIndustryFields() {
      const show = byId("industry").value === "汽車業";
      document.querySelectorAll(".repair-field").forEach(el => el.style.display = show ? "" : "none");
    }

    function readLocations() {
      return [...byId("locations").querySelectorAll("[data-location]")].map(block => {
        const obj = {};
        block.querySelectorAll("[data-field]").forEach(input => obj[input.dataset.field] = input.value);
        return obj;
      });
    }

    function detectIncludedFields(text, sourceField) {
      const sourceLabel = fieldMeta[sourceField].label;
      const matches = [...plain(text).matchAll(/[（(]([^（）()]*)[）)]/g)];
      const hits = [];
      for (const match of matches) {
        const content = match[1];
        if (!content.includes("含")) continue;
        for (const field of moneyFields) {
          if (field === sourceField) continue;
          if (fieldMeta[field].aliases.some(alias => content.includes(alias))) {
            hits.push({ field, key: fieldMeta[field].key, note: `含${sourceLabel}` });
          }
        }
      }
      return hits;
    }

    function inclusionNotes(loc) {
      const notes = {};
      for (const field of moneyFields) notes[field] = [];
      for (const sourceField of moneyFields) {
        if (moneyValue(loc[sourceField]) <= 0) continue;
        for (const hit of detectIncludedFields(loc[sourceField], sourceField)) {
          if (!notes[hit.field].includes(hit.note)) notes[hit.field].push(hit.note);
        }
      }
      return notes;
    }

    function displayPropertyCell(loc, field) {
      const amount = fieldAmountText(loc[field]);
      const notes = inclusionNotes(loc)[field] || [];
      if (amount && notes.length) return `${amount}<br><small>${notes.map(escapeHtml).join("<br>")}</small>`;
      if (amount) return amount;
      return notes.map(escapeHtml).join("<br>");
    }

    function selectedPropertyKeys(locations = readLocations()) {
      const active = new Set();
      for (const loc of locations) {
        for (const item of propertyMap) {
          if (moneyValue(loc[item.field]) > 0) active.add(item.key);
        }
        for (const sourceField of moneyFields) {
          for (const hit of detectIncludedFields(loc[sourceField], sourceField)) {
            active.add(hit.key);
          }
        }
      }
      return active;
    }

    function renderClauseSelector(mode = "recommend") {
      const active = selectedPropertyKeys();
      const shouldCheck = clause => {
        if (mode === "all") return true;
        if (mode === "none") return false;
        return propertyMap.some(item => active.has(item.key) && clause[item.key]);
      };
      byId("clauseBox").innerHTML = SB_CLAUSES.map(clause => `
        <label class="clause-row">
          <input type="checkbox" class="clause-check" value="${escapeHtml(clause.code)}" ${shouldCheck(clause) ? "checked" : ""}>
          <span>${escapeHtml(clause.code)}</span>
          <span>${escapeHtml(cleanClauseTitle(clause.title))}</span>
        </label>
      `).join("");
    }

    function readCovers() {
      return [...document.querySelectorAll("#covers tr")].map(row => {
        return {
          on: row.querySelector(".cover-on").checked,
          name: plain(row.querySelector(".cover-name").value),
          amount: plain(row.querySelector(".cover-amount").value)
        };
      }).filter(c => c.on && c.name);
    }

    function selectedClauses() {
      const selected = new Set([...document.querySelectorAll(".clause-check:checked")].map(el => el.value));
      const standardClauses = SB_CLAUSES.filter(c => selected.has(c.code));
      const customClauses = [...document.querySelectorAll(".custom-clause-input")]
        .map(input => plain(input.value))
        .filter(Boolean)
        .map(title => ({ title }));
      return standardClauses.concat(customClauses);
    }

    function addCustomClause(value = "") {
      byId("customClauseBox").insertAdjacentHTML("beforeend", `
        <div class="custom-clause-row" style="display:grid;grid-template-columns:1fr 52px;gap:8px;margin-top:8px">
          <input class="custom-clause-input" value="${escapeHtml(value)}" placeholder="輸入自訂附加條款名稱">
          <button class="btn danger remove-custom-clause" type="button">X</button>
        </div>
      `);
    }

    function isNaturalDisasterCover(name) {
      return name.includes("颱風") || name.includes("洪水") || name.includes("地震");
    }

    function otherAddonRows(covers, total, addonPercent) {
      const others = covers.filter(c => !isNaturalDisasterCover(c.name));
      if (!others.length) return `<tr><td style="font-weight:700">其他附加險比例</td><td>火險保額 ${addonPercent}%：${fmtMoney(total * Number(addonPercent) / 100)}</td></tr>`;
      const hasDifferent = others.some(c => c.amount && String(c.amount) !== String(addonPercent));
      if (!hasDifferent) {
        return `<tr><td style="font-weight:700">其他附加險比例</td><td>火險保額 ${addonPercent}%：${fmtMoney(total * Number(addonPercent) / 100)}</td></tr>`;
      }
      const groups = new Map();
      for (const cover of others) {
        const percent = cover.amount || addonPercent;
        if (!groups.has(percent)) groups.set(percent, []);
        groups.get(percent).push(cover.name);
      }
      const sortedGroups = [...groups.entries()].sort((a, b) => {
        if (b[1].length !== a[1].length) return b[1].length - a[1].length;
        if (String(a[0]) === String(addonPercent)) return -1;
        if (String(b[0]) === String(addonPercent)) return 1;
        return Number(b[0]) - Number(a[0]);
      });
      const [mainPercent, mainNames] = sortedGroups[0];
      const exceptionNames = sortedGroups.slice(1).flatMap(([, names]) => names);
      const exceptionRows = sortedGroups.slice(1).map(([percent, names]) => {
        const amount = Math.round(total * Number(percent) / 100);
        return `<tr><td style="font-weight:700">${escapeHtml(names.join("、"))}</td><td>火險保額 ${percent}%：${fmtMoney(amount)}</td></tr>`;
      }).join("");
      const mainAmount = Math.round(total * Number(mainPercent) / 100);
      const mainLabel = exceptionNames.length
        ? `除${escapeHtml(exceptionNames.join("、"))}外，其餘附加險種`
        : "其餘附加險種";
      return exceptionRows + `<tr><td style="font-weight:700">${mainLabel}</td><td>火險保額 ${mainPercent}%：${fmtMoney(mainAmount)}</td></tr>`;
    }

    function totalFireAmount(locations) {
      return locations.reduce((sum, loc) => sum + locationSubtotal(loc), 0);
    }

    function locationSubtotal(loc) {
      return moneyFields.reduce((s, f) => s + moneyValue(loc[f]), 0);
    }

    function renderQuote() {
      const locations = readLocations();
      const covers = readCovers();
      const clauses = selectedClauses();
      const total = totalFireAmount(locations);
      const industry = plain(byId("industry").value);
      const now = new Date();
      const dateText = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,"0")}/${String(now.getDate()).padStart(2,"0")}`;
      const natPercent = byId("natPercent").value;
      const natLimit = byId("natLimit").value;
      const addonPercent = byId("addonPercent").value;
      const natAmount = Math.round(total * Number(natPercent) / 100);
      const limitAmount = Math.round(total * Number(natLimit) / 100);
      const repairCol = industry === "汽車業" ? `<th>是否有修理廠</th>` : "";
      const addonRows = otherAddonRows(covers, total, addonPercent);

      const subjectRows = locations.map((loc, idx) => `
        <tr>
          <td>${idx + 1}</td>
          <td>${escapeHtml(loc.siteName || "")}</td>
          <td>${escapeHtml(loc.address || "")}</td>
          <td>${escapeHtml(loc.usageNature || "")}</td>
          <td style="text-align:right">${displayPropertyCell(loc, "building")}</td>
          <td style="text-align:right">${displayPropertyCell(loc, "decoration")}</td>
          <td style="text-align:right">${displayPropertyCell(loc, "machinery")}</td>
          <td style="text-align:right">${displayPropertyCell(loc, "equipment")}</td>
          <td style="text-align:right">${displayPropertyCell(loc, "goods")}</td>
          ${industry === "汽車業" ? `<td>${escapeHtml(loc.repairShop || "否")}</td>` : ""}
          <td style="text-align:right;font-weight:700">${fmtMoney(locationSubtotal(loc))}</td>
          <td>${escapeHtml(loc.structure || "")}</td>
        </tr>
      `).join("");

      byId("quotePreview").innerHTML = `
        <div class="quote-title">
          <div>
            <h2>商業火災保險報價單</h2>
          </div>
          <div class="meta">
            <div>製表日期：${dateText}</div>
            <div>產業別：${escapeHtml(industry)}</div>
          </div>
        </div>

        <h3>被保險人資訊</h3>
        <div class="info-grid">
          <div class="info-label">公司名稱</div><div>${escapeHtml(byId("companyName").value)}</div>
          <div class="info-label">統一編號</div><div>${escapeHtml(byId("taxId").value)}</div>
          <div class="info-label">代表人</div><div>${escapeHtml(byId("representative").value)}</div>
          <div class="info-label">電話</div><div>${escapeHtml(byId("phone").value)}</div>
          <div class="info-label">通訊地址</div><div style="grid-column: span 3">${escapeHtml(byId("mailingAddress").value)}</div>
          <div class="info-label">保險期間</div><div style="grid-column: span 3">${escapeHtml(byId("insurancePeriod").value)}</div>
        </div>

        <h3>本保險契約所承保之危險事故</h3>
        <table>
          <tbody>
            <tr><td>火災</td></tr>
            <tr><td>爆炸引起之火災</td></tr>
            <tr><td>閃電雷擊</td></tr>
          </tbody>
        </table>

        <h3>標的物與保額</h3>
        <table>
          <thead>
            <tr>
              <th style="width:38px">#</th><th>名稱</th><th>標的物地址</th><th>使用性質</th>
              <th>建築物</th><th>營業裝修</th><th>機器設備</th><th>營業生財</th><th>貨物</th>${repairCol}<th>小計</th><th>建築結構</th>
            </tr>
          </thead>
          <tbody>${subjectRows || `<tr><td colspan="${industry === "汽車業" ? 12 : 11}">尚未輸入標的物</td></tr>`}</tbody>
          <tfoot><tr><td colspan="${industry === "汽車業" ? 11 : 10}" style="text-align:right;font-weight:700">火險總保額</td><td style="font-weight:700;text-align:right">${fmtMoney(total)}</td></tr></tfoot>
        </table>

        <h3>自負額</h3>
        <table>
          <tbody>
            <tr><td>${escapeHtml(byId("deductible").value).replace(/\n/g, "<br>")}</td></tr>
          </tbody>
        </table>

        <h3>天災保額</h3>
        <table>
          <tbody>
            <tr><td>火險保額 ${natPercent}%：${fmtMoney(natAmount)}</td></tr>
          </tbody>
        </table>

        <h3>天災限額</h3>
        <table>
          <tbody>
            <tr><td>火險保額 ${natLimit}%：${fmtMoney(limitAmount)}</td></tr>
          </tbody>
        </table>

        <h3>附加險</h3>
        <table>
          <tbody>
            ${addonRows}
          </tbody>
        </table>

        <h3>備註</h3>
        <table>
          <tbody>
            <tr><td>${escapeHtml(byId("remarks").value).replace(/\n/g, "<br>")}</td></tr>
          </tbody>
        </table>

        <h3>SB 附加條款</h3>
        <ol class="terms-list">
          ${clauses.map(c => `<li>${escapeHtml(cleanClauseTitle(c.title))}</li>`).join("") || "<li>尚未選擇附加條款</li>"}
        </ol>
      `;
      byId("saveStatus").textContent = "已產生";
    }

    function generateQuote() {
      if (!document.querySelector(".clause-check:checked")) {
        renderClauseSelector("recommend");
      }
      renderQuote();
    }

    function fillSample() {
      byId("industry").value = "汽車業";
      byId("companyName").value = "範例汽車服務股份有限公司";
      byId("taxId").value = "00000000";
      byId("representative").value = "王小明";
      byId("phone").value = "02-0000-0000";
      byId("mailingAddress").value = "臺北市範例區測試路100號";
      byId("insurancePeriod").value = "2026/07/01 中午12時起至 2027/07/01 中午12時止";
      byId("locations").innerHTML = "";
      addLocation({
        siteName: "範例-服務廠A",
        address: "臺北市範例區測試路100號1樓及2樓",
        usageNature: "辦公室及維修服務區",
        decoration: "35000000",
        equipment: "400000",
        goods: "16000000",
        repairShop: "是",
        structure: "鋼筋混凝土造平屋頂地上5層樓地下1層樓 特二等建築"
      });
      addLocation({
        siteName: "範例-服務廠B",
        address: "臺北市範例區示範街200號(全棟)",
        usageNature: "倉庫",
        decoration: "38000000",
        machinery: "1100000",
        goods: "17500000",
        repairShop: "是",
        structure: "鋼骨造鐵皮屋頂地上3層樓地下1層樓 頭等建築"
      });
      byId("remarks").value = "本保單颱風及洪水險對於室外廣告設備及招牌所遭受之損失及滅失，亦負賠償責任。";
      document.querySelectorAll(".cover-on").forEach(el => el.checked = true);
      renderClauseSelector("recommend");
      renderQuote();
    }

    function clearAll() {
      ["companyName", "taxId", "representative", "phone", "mailingAddress", "insurancePeriod", "remarks"].forEach(id => byId(id).value = "");
      byId("locations").innerHTML = "";
      addLocation();
      document.querySelectorAll(".cover-on").forEach((el, idx) => el.checked = idx === 0);
      document.querySelectorAll(".cover-amount").forEach(el => el.value = "");
      renderClauseSelector("none");
      byId("customClauseBox").innerHTML = "";
      byId("quotePreview").innerHTML = `<div class="empty">填完左側資料後，按「產生報價單」。</div>`;
      byId("saveStatus").textContent = "已清空";
    }

    document.addEventListener("click", e => {
      if (e.target.matches(".remove-location")) {
        e.target.closest("[data-location]").remove();
        updateLocationNumbers();
      }
      if (e.target.matches(".remove-custom-clause")) {
        e.target.closest(".custom-clause-row").remove();
      }
    });
    byId("industry").addEventListener("change", syncIndustryFields);
    byId("addLocationBtn").addEventListener("click", () => addLocation());
    byId("addCoverBtn").addEventListener("click", () => addCover());
    byId("addCustomClauseBtn").addEventListener("click", () => addCustomClause());
    byId("recommendBtn").addEventListener("click", () => renderClauseSelector("recommend"));
    byId("selectAllClausesBtn").addEventListener("click", () => renderClauseSelector("all"));
    byId("clearClausesBtn").addEventListener("click", () => renderClauseSelector("none"));
    byId("generateBtn").addEventListener("click", generateQuote);
    byId("printBtn").addEventListener("click", () => { generateQuote(); window.print(); });
    byId("sampleBtn").addEventListener("click", fillSample);
    byId("clearBtn").addEventListener("click", clearAll);

    initPercentOptions();
    renderCovers();
    addLocation();
    renderClauseSelector("none");
  </script>
</body>
</html>
